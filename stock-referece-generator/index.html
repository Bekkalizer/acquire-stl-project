<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acquire – Reference Sheet Generator</title>
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== SCREEN LAYOUT ===== */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #ccc;
      display: flex;
      min-height: 100vh;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 254px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #282828;
      padding: 1rem 1.1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .sb-title {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #eee;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid #282828;
    }

    .sb-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #555;
      margin-bottom: 0.45rem;
    }

    /* Hotel color rows */
    .hotel-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.32rem;
    }

    .swatch {
      width: 17px;
      height: 17px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .name-in {
      flex: 1;
      min-width: 0;
      padding: 2px 5px;
      background: #222;
      border: 1px solid #363636;
      border-radius: 3px;
      color: #ddd;
      font-size: 0.73rem;
    }

    .name-in:focus { outline: none; border-color: #4466bb; }

    .hex-in {
      width: 68px;
      padding: 2px 5px;
      background: #222;
      border: 1px solid #363636;
      border-radius: 3px;
      color: #ddd;
      font-family: monospace;
      font-size: 0.73rem;
    }

    .hex-in:focus { outline: none; border-color: #4466bb; }

    .pick-in {
      width: 25px;
      height: 23px;
      padding: 0;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      background: none;
    }

    /* Option rows */
    .opt-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.38rem;
      font-size: 0.78rem;
      color: #bbb;
      cursor: pointer;
      user-select: none;
    }

    .opt-row input { accent-color: #4466bb; cursor: pointer; }

    /* Print button */
    .print-btn {
      display: block;
      width: 100%;
      padding: 0.58rem;
      background: #2f4d9e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      margin-top: auto;
    }

    .print-btn:hover { background: #3d5fb5; }

    /* ---- Main area ---- */
    .main {
      flex: 1;
      padding: 2rem;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== THE SHEET (themed via CSS vars) ===== */
    .sheet {
      /* -- dark theme (default) -- */
      --sh-bg: #0a0a1e;
      --sh-text: #e0e0e0;
      --sh-border: #18183a;
      --sh-title: #fff;
      --sh-mode: #666;
      --sh-tier-lbl: #666;
      --sh-th-bg: #0d0d25;
      --sh-th-color: #888;
      --sh-size-color: #ddd;
      --sh-dash: #2a2a4a;
      --sh-price-bg: #101028;
      --sh-price-bg-alt: #14142e;
      --sh-price-color: #fff;
      --sh-rule-head: #6688bb;
      --sh-rule-text: #999;
      --sh-rule-bullet: #3a3a5a;
      --sh-chip-shadow: 0 1px 3px rgba(0,0,0,0.65);

      width: 210mm;
      background: var(--sh-bg);
      color: var(--sh-text);
      padding: 8mm 10mm;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 4px 50px rgba(0,0,0,0.7);
    }

    /* -- light theme override -- */
    .sheet.light {
      --sh-bg: #f3f3ed;
      --sh-text: #222;
      --sh-border: #bbbbc4;
      --sh-title: #111;
      --sh-mode: #777;
      --sh-tier-lbl: #666;
      --sh-th-bg: #e6e6e0;
      --sh-th-color: #555;
      --sh-size-color: #333;
      --sh-dash: #ccc;
      --sh-price-bg: #eaeae4;
      --sh-price-bg-alt: #e0e0da;
      --sh-price-color: #111;
      --sh-rule-head: #2d5599;
      --sh-rule-text: #555;
      --sh-rule-bullet: #bbb;
      --sh-chip-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    /* Title */
    .sh-title {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--sh-title);
      margin-bottom: 4mm;
      padding-bottom: 3mm;
      border-bottom: 1px solid var(--sh-border);
    }

    .sh-mode {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--sh-mode);
      display: block;
      margin-top: 1mm;
    }

    /* ---- Price table ---- */
    .price-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 4mm;
      font-size: 0.73rem;
      table-layout: fixed;
    }

    .price-table th, .price-table td {
      padding: 1.6mm 1.8mm;
      border: 1px solid var(--sh-border);
      text-align: center;
      vertical-align: middle;
    }

    /* Tier header cells */
    .th-tier {
      vertical-align: bottom;
      padding-top: 2mm !important;
      padding-bottom: 2mm !important;
    }

    .tier-lbl {
      display: block;
      font-size: 0.56rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--sh-tier-lbl);
      margin-bottom: 1.5mm;
    }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1mm;
      justify-content: center;
    }

    .chip {
      display: inline-block;
      padding: 1mm 2.2mm;
      border-radius: 2px;
      font-size: 0.6rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* Column headers: price & bonus */
    .th-price {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--sh-th-color);
      background: var(--sh-th-bg);
      line-height: 1.4;
    }

    .th-bonus {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--sh-th-bg);
      line-height: 1.4;
    }

    .th-note {
      display: block;
      font-size: 0.5rem;
      opacity: 0.55;
      letter-spacing: 0.04em;
    }

    /* Data cells */
    .td-size {
      font-size: 0.7rem;
      color: var(--sh-size-color);
    }

    .td-dash {
      color: var(--sh-dash);
      font-size: 0.75rem;
    }

    .td-price {
      font-weight: 700;
      color: var(--sh-price-color);
      font-size: 0.75rem;
      background: var(--sh-price-bg);
    }

    .td-bonus {
      font-size: 0.68rem;
    }

    /* Alternating rows */
    .price-table tbody tr:nth-child(even) .td-price { background: var(--sh-price-bg-alt); }

    /* ---- Rules section ---- */
    .rules-section {
      border-top: 1px solid var(--sh-border);
      padding-top: 3.5mm;
    }

    .rules-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3mm;
    }

    .rule-title {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--sh-rule-head);
      margin-bottom: 1.5mm;
      padding-bottom: 0.8mm;
      border-bottom: 1px solid var(--sh-border);
    }

    .rule-list {
      list-style: none;
    }

    .rule-list li {
      font-size: 0.63rem;
      color: var(--sh-rule-text);
      line-height: 1.42;
      padding-left: 0.8em;
      position: relative;
    }

    .rule-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--sh-rule-bullet);
    }

    /* ===== PRINT ===== */
    @media print {
      body { display: block; background: none; min-height: 0; }
      .sidebar { display: none; }
      .main { display: block; padding: 0; }
      .sheet {
        box-shadow: none;
        width: 100%;
        padding: 5mm 8mm;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .price-table { page-break-inside: avoid; }
      .rules-section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="sb-title">Acquire Generator</div>

  <div>
    <div class="sb-label">Hotels</div>
    <div id="hotel-inputs"></div>
  </div>

  <div>
    <div class="sb-label">Bonus Mode</div>
    <label class="opt-row">
      <input type="radio" name="mode" value="classic" checked>
      Classic &mdash; Majority + Minority
    </label>
    <label class="opt-row">
      <input type="radio" name="mode" value="tycoon">
      Tycoon &mdash; 1st / 2nd / 3rd
    </label>
  </div>

  <div>
    <div class="sb-label">Price Format</div>
    <label class="opt-row">
      <input type="radio" name="pscale" value="millions" checked>
      Millions &mdash; 2 M$
    </label>
    <label class="opt-row">
      <input type="radio" name="pscale" value="standard">
      Standard &mdash; $200
    </label>
  </div>

  <div>
    <div class="sb-label">Theme</div>
    <label class="opt-row">
      <input type="radio" name="theme" value="dark" checked>
      Dark
    </label>
    <label class="opt-row">
      <input type="radio" name="theme" value="light">
      Light
    </label>
  </div>

  <div>
    <div class="sb-label">Content</div>
    <label class="opt-row">
      <input type="checkbox" id="opt-rules" checked>
      Include rules summary
    </label>
  </div>

  <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
</aside>

<!-- ===== MAIN ===== -->
<main class="main">
  <div class="sheet" id="sheet"></div>
</main>

<script>
'use strict';

// ================================================================
// DATA
// ================================================================

const HOTELS = [
  { id: 'sackson',     name: 'Luxor',       tier: 0, color: '#CC2222' },
  { id: 'tower',       name: 'Tower',       tier: 0, color: '#CCAA00' },
  { id: 'american',    name: 'American',    tier: 1, color: '#1A3A8F' },
  { id: 'festival',    name: 'Festival',    tier: 1, color: '#2B8B2B' },
  { id: 'worldwide',   name: 'Worldwide',   tier: 1, color: '#7B2D8B' },
  { id: 'continental', name: 'Continental', tier: 2, color: '#2288BB' },
  { id: 'imperial',    name: 'Imperial',    tier: 2, color: '#CC6622' },
];

const TIER_LABELS = ['Cheap', 'Medium', 'Expensive'];

// 11 price rows: [cheap_size, medium_size, expensive_size, stock_price]
// Mirrors the staggered layout of the original reference sheet.
const TABLE_ROWS = [
  ['2',     '–',     '–',     200],
  ['3',     '2',     '–',     300],
  ['4',     '3',     '2',     400],
  ['5',     '4',     '3',     500],
  ['6–10',  '5',     '4',     600],
  ['11–20', '6–10',  '5',     700],
  ['21–30', '11–20', '6–10',  800],
  ['31–40', '21–30', '11–20', 900],
  ['41+',   '31–40', '21–30', 1000],
  ['–',     '41+',   '31–40', 1100],
  ['–',     '–',     '41+',   1200],
];

// Bonus values sourced from the original Stockholder Info Sheet PDF.
// Each column stores a dark and light color variant for readability.
const MODE_BONUSES = {
  classic: {
    label: 'Classic Mode',
    cols: [
      { head: 'Primary',   note: '10×',
        color: '#6688dd', colorLight: '#2b4faa',
        vals: [2000,3000,4000,5000,6000,7000,8000,9000,10000,11000,12000] },
      { head: 'Secondary', note: '5×',
        color: '#44aa66', colorLight: '#1d7a44',
        vals: [1000,1500,2000,2500,3000,3500,4000,4500,5000,5500,6000] },
    ],
  },
  tycoon: {
    label: 'Tycoon Mode',
    cols: [
      { head: 'Primary',   note: '10×',
        color: '#ccaa22', colorLight: '#8a7000',
        vals: [2000,3000,4000,5000,6000,7000,8000,9000,10000,11000,12000] },
      { head: 'Secondary', note: '~7×',
        color: '#999999', colorLight: '#555555',
        vals: [1500,2200,3000,3700,4200,5000,5700,6200,7000,7700,8200] },
      { head: 'Tertiary',  note: '5×',
        color: '#aa6633', colorLight: '#7a4411',
        vals: [1000,1500,2000,2500,3000,3500,4000,4500,5000,5500,6000] },
    ],
  },
};

const RULES_DATA = [
  {
    title: 'Setup',
    items: [
      '$6,000 per player',
      'Draw & place a tile — closest to 1A starts',
      'Each player draws 6 tiles',
    ],
  },
  {
    title: 'Turn',
    items: [
      'Place a building tile',
      'Buy up to 3 stocks',
      'Draw a replacement tile',
    ],
  },
  {
    title: 'Mergers',
    items: [
      'Larger chain absorbs smaller',
      'Distribute bonuses first',
      'Shareholders: keep / sell / trade 2:1',
    ],
  },
  {
    title: 'Game End',
    items: [
      'All active chains are safe (11+), or',
      'Any chain reaches 41+ tiles',
      'Remaining shareholders receive bonuses',
    ],
  },
];

// ================================================================
// STATE
// ================================================================

const colors = {};
const names = {};
HOTELS.forEach(h => { colors[h.id] = h.color; names[h.id] = h.name; });

// ================================================================
// UTILITIES
// ================================================================

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function money(n, scale) {
  if (scale === 'millions') return (n / 100) + ' M$';
  return '$' + n.toLocaleString('en-US');
}

function rgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function tierColor(ti) {
  const h = HOTELS.find(h => h.tier === ti);
  return h ? colors[h.id] : '#555555';
}

// Returns '#000' for light backgrounds, '#fff' for dark ones.
function chipTextColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  // Perceived brightness (ITU-R BT.601)
  return (0.299 * r + 0.587 * g + 0.114 * b) > 186 ? '#000' : '#fff';
}

// ================================================================
// CONTROLS
// ================================================================

function buildControls() {
  const root = document.getElementById('hotel-inputs');
  HOTELS.forEach(h => {
    const row = document.createElement('div');
    row.className = 'hotel-row';

    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = h.color;

    const nm = document.createElement('input');
    nm.type = 'text';
    nm.className = 'name-in';
    nm.value = h.name;
    nm.spellcheck = false;

    nm.addEventListener('input', () => {
      names[h.id] = nm.value;
      renderSheet();
    });

    const hex = document.createElement('input');
    hex.type = 'text';
    hex.className = 'hex-in';
    hex.value = h.color;
    hex.maxLength = 7;
    hex.spellcheck = false;

    const pick = document.createElement('input');
    pick.type = 'color';
    pick.className = 'pick-in';
    pick.value = h.color;

    function apply(val) {
      colors[h.id] = val;
      sw.style.background = val;
      renderSheet();
    }

    hex.addEventListener('input', () => {
      const v = hex.value.trim();
      if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
        pick.value = v;
        apply(v);
      }
    });

    pick.addEventListener('input', () => {
      hex.value = pick.value;
      apply(pick.value);
    });

    row.append(sw, nm, hex, pick);
    root.appendChild(row);
  });
}

// ================================================================
// RENDER
// ================================================================

function renderSheet() {
  const mode      = document.querySelector('input[name="mode"]:checked').value;
  const pscale    = document.querySelector('input[name="pscale"]:checked').value;
  const theme     = document.querySelector('input[name="theme"]:checked').value;
  const showRules = document.getElementById('opt-rules').checked;
  const bonuses   = MODE_BONUSES[mode];
  const isLight   = theme === 'light';
  const byTier    = [[], [], []];
  HOTELS.forEach(h => byTier[h.tier].push(h));

  // Toggle light class on the sheet element
  const sheetEl = document.getElementById('sheet');
  sheetEl.classList.toggle('light', isLight);

  // Tint alpha: slightly stronger on light backgrounds for visibility
  const tintHeader = isLight ? 0.18 : 0.14;
  const tintCell   = isLight ? 0.12 : 0.08;

  // Column width distribution
  const tierColW  = 11;
  const priceColW = 12;
  const bonusColW = Math.floor((100 - 3 * tierColW - priceColW) / bonuses.cols.length);

  let html = '';

  // ── Title ───────────────────────────────────────────────────
  html += `<div class="sh-title">
    Acquire &nbsp;&mdash;&nbsp; Stockholder Reference
    <span class="sh-mode">${esc(bonuses.label)}</span>
  </div>`;

  // ── Table ───────────────────────────────────────────────────
  html += `<table class="price-table"><colgroup>`;
  for (let i = 0; i < 3; i++)
    html += `<col style="width:${tierColW}%">`;
  html += `<col style="width:${priceColW}%">`;
  bonuses.cols.forEach(() => {
    html += `<col style="width:${bonusColW}%">`;
  });
  html += `</colgroup>`;

  // Header row
  html += `<thead><tr>`;

  for (let ti = 0; ti < 3; ti++) {
    const c    = tierColor(ti);
    const tint = rgba(c, tintHeader);
    html += `<th class="th-tier" style="background:${tint};border-bottom:2px solid ${c}">`;
    html += `<span class="tier-lbl">${esc(TIER_LABELS[ti])}</span>`;
    html += `<div class="chips-row">`;
    byTier[ti].forEach(h => {
      const tc = chipTextColor(colors[h.id]);
      html += `<span class="chip" style="background:${colors[h.id]};color:${tc}">${esc(names[h.id])}</span>`;
    });
    html += `</div></th>`;
  }

  html += `<th class="th-price">Stock<br>Price</th>`;

  bonuses.cols.forEach(b => {
    const bc = isLight ? b.colorLight : b.color;
    html += `<th class="th-bonus" style="color:${bc}">
      ${esc(b.head)}<span class="th-note">${esc(b.note)}</span>
    </th>`;
  });

  html += `</tr></thead><tbody>`;

  // Data rows
  TABLE_ROWS.forEach((row, i) => {
    html += `<tr>`;

    for (let ti = 0; ti < 3; ti++) {
      const val = row[ti];
      if (val === '–') {
        html += `<td class="td-dash">—</td>`;
      } else {
        const c    = tierColor(ti);
        const tint = rgba(c, tintCell);
        html += `<td class="td-size" style="background:${tint}">${esc(val)}</td>`;
      }
    }

    html += `<td class="td-price">${money(row[3], pscale)}</td>`;

    bonuses.cols.forEach(b => {
      const bc = isLight ? b.colorLight : b.color;
      html += `<td class="td-bonus" style="color:${bc}">${money(b.vals[i], pscale)}</td>`;
    });

    html += `</tr>`;
  });

  html += `</tbody></table>`;

  // ── Rules section ────────────────────────────────────────────
  if (showRules) {
    const startMoney = pscale === 'millions' ? '60 M$' : '$6,000';
    html += `<div class="rules-section"><div class="rules-grid">`;
    RULES_DATA.forEach(r => {
      html += `<div>
        <div class="rule-title">${esc(r.title)}</div>
        <ul class="rule-list">`;
      r.items.forEach(item => {
        const text = item.replace('$6,000', startMoney);
        html += `<li>${esc(text)}</li>`;
      });
      html += `</ul></div>`;
    });
    html += `</div></div>`;
  }

  sheetEl.innerHTML = html;
}

// ================================================================
// INIT
// ================================================================

buildControls();
renderSheet();

['mode', 'pscale', 'theme'].forEach(name => {
  document.querySelectorAll(`input[name="${name}"]`).forEach(el =>
    el.addEventListener('change', renderSheet)
  );
});
document.getElementById('opt-rules').addEventListener('change', renderSheet);
</script>
</body>
</html>
